<svg xmlns="http://www.w3.org/2000/svg" width="900" height="360" viewBox="0 0 900 360" role="img" aria-label="Mermaid diagram of retrieval providers">
  <style>
    .box{fill:#f8fafc;stroke:#334155;stroke-width:2;rx:8}
    .active{fill:#dcfce7;stroke:#15803d;stroke-width:2;rx:8}
    .placeholder{fill:#fee2e2;stroke:#b91c1c;stroke-width:2;rx:8}
    .text{font-family:Arial, sans-serif;font-size:15px;fill:#0f172a}
    .title{font-family:Arial, sans-serif;font-size:20px;font-weight:bold;fill:#0f172a}
    .arrow{stroke:#334155;stroke-width:2;marker-end:url(#arrow)}
    .dash{stroke:#b91c1c;stroke-width:2;stroke-dasharray:6 5;marker-end:url(#arrowRed)}
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10z" fill="#334155"/></marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10z" fill="#b91c1c"/></marker>
  </defs>
  <text x="24" y="34" class="title">Retrieval Providers</text>
  <rect x="350" y="70" width="200" height="56" class="box"/><text x="386" y="104" class="text">Retriever Interface</text>
  <rect x="70" y="190" width="190" height="56" class="active"/><text x="110" y="224" class="text">BM25 active</text>
  <rect x="355" y="190" width="190" height="56" class="placeholder"/><text x="383" y="224" class="text">Embedding future</text>
  <rect x="640" y="190" width="190" height="56" class="placeholder"/><text x="679" y="224" class="text">Hybrid future</text>
  <path d="M395 126 L185 190" class="arrow"/><path d="M450 126 V190" class="arrow"/><path d="M505 126 L735 190" class="arrow"/>
  <text x="360" y="300" class="text">Future providers raise RetrievalProviderUnavailable.</text>
</svg>
